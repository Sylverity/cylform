name: Windows Desktop Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: desktop/src-ui/package-lock.json

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install frontend dependencies
      working-directory: desktop/src-ui
      run: npm install

    - name: Build desktop app and refresh root exe
      shell: pwsh
      run: ./scripts/build-desktop.ps1 -SkipFrontendInstall

    - name: Upload standalone exe
      uses: actions/upload-artifact@v4
      with:
        name: CYLview-NG-windows-exe
        path: |
          CYLview-NG.exe
          target/release/cylview-ng.exe
        if-no-files-found: error

    - name: Upload installer artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CYLview-NG-windows-bundles
        path: target/release/bundle/**
        if-no-files-found: warn
