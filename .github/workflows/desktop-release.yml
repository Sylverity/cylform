name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows installers
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/src-ui/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: desktop/src-ui
        run: npm ci

      - name: Build Windows bundles
        working-directory: desktop
        run: src-ui\node_modules\.bin\tauri.cmd build --bundles nsis,msi

      - name: Stage Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/release | Out-Null
          Copy-Item target/release/cylform.exe dist/release/cylform.exe
          Copy-Item (Get-ChildItem target/release/bundle/nsis/*-setup.exe | Select-Object -First 1) dist/release/Cylform-setup.exe
          Copy-Item (Get-ChildItem target/release/bundle/msi/*.msi | Select-Object -First 1) dist/release/Cylform.msi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cylform-windows
          path: dist/release/*
          if-no-files-found: error

  build-linux:
    name: Build Ubuntu/Debian package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/src-ui/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: desktop/src-ui
        run: npm ci

      - name: Build Debian package
        working-directory: desktop
        run: src-ui/node_modules/.bin/tauri build --bundles deb

      - name: Stage Linux artifacts
        run: |
          mkdir -p dist/release
          cp target/release/cylform dist/release/cylform
          cp target/release/bundle/deb/*.deb dist/release/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cylform-linux
          path: dist/release/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Cylform-*
          merge-multiple: true
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
